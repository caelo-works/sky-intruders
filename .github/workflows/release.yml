name: Release

# Push a semver tag (e.g. `v1.0.0`) to cut a release: this builds the distribution
# artifact and publishes it as release assets for the CaeloWorks update site to ingest.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Version from tag
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build the distribution artifact
        run: bash scripts/build-update-package.sh "${{ steps.v.outputs.version }}"
      - name: Publish release + assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$(ls dist/*.zip | xargs -n1 basename | sed 's/-[^-]*\.zip$//') $GITHUB_REF_NAME" \
            --generate-notes \
            dist/*.zip \
            dist/update-package.json
