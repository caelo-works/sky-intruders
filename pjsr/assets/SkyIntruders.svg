<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Sky Intruders">
  <!-- Sky Intruders: the tile IS the sky field (no frame inside the frame).
       Silhouette = one bold diagonal trail. The amber star is the treasure
       (Treasure Hunt mode); it lives in the corner the trail leaves free. -->
  <defs>
    <linearGradient id="siTile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111c33"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="siTrail" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#67e8f9"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#siTile)"/>
  <rect x="2.75" y="2.75" width="58.5" height="58.5" rx="13.25" fill="none" stroke="#334155" stroke-width="1.5"/>

  <!-- the star field -->
  <g fill="#cbd5e1">
    <circle cx="15" cy="16" r="1.7"/>
    <circle cx="26" cy="11" r="1.3"/>
    <circle cx="13" cy="33" r="1.5"/>
    <circle cx="52" cy="27" r="1.4"/>
    <circle cx="24" cy="52" r="1.5"/>
    <circle cx="34" cy="43" r="1.2"/>
  </g>

  <!-- the treasure: what you captured without knowing -->
  <circle cx="47" cy="47" r="5.6" fill="#f59e0b" opacity="0.25"/>
  <circle cx="47" cy="47" r="3.4" fill="#fbbf24"/>
  <circle cx="47" cy="47" r="1.3" fill="#fff7ed"/>

  <!-- the intruder: the trail, dominant element of the silhouette -->
  <line x1="13" y1="51" x2="49" y2="15" stroke="url(#siTrail)" stroke-width="5" stroke-linecap="round"/>

  <!-- the object at the trail's leading edge -->
  <circle cx="49" cy="15" r="4" fill="#e0f2fe" stroke="#22d3ee" stroke-width="1.6"/>
</svg>
