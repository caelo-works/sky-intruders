<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Sky Intruders: a light frame crossed by a satellite trail over a starfield -->
  <defs>
    <linearGradient id="trail" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- the frame (sensor / photo) -->
  <rect x="6" y="6" width="52" height="52" rx="9" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <!-- starfield -->
  <g fill="#cbd5e1">
    <circle cx="17" cy="20" r="1.6"/>
    <circle cx="44" cy="15" r="1.3"/>
    <circle cx="50" cy="34" r="1.7"/>
    <circle cx="22" cy="45" r="1.4"/>
    <circle cx="38" cy="48" r="1.5"/>
    <circle cx="30" cy="27" r="1.2"/>
  </g>
  <!-- a highlighted treasure star (Treasure Hunt mode) -->
  <circle cx="46" cy="46" r="3.4" fill="#f59e0b"/>
  <circle cx="46" cy="46" r="1.4" fill="#fff7ed"/>
  <!-- the intruder: a bright trail streaking across the field -->
  <line x1="13" y1="51" x2="51" y2="13" stroke="url(#trail)" stroke-width="4" stroke-linecap="round"/>
  <!-- the object at the trail's leading edge -->
  <circle cx="51" cy="13" r="3.2" fill="#e0f2fe" stroke="#22d3ee" stroke-width="1.4"/>
</svg>
